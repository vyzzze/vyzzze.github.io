<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <title>404 · vyze</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        /* Animated background elements for depth */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* The Glassmorphism Card */
        .glass-container {
            position: relative;
            z-index: 1;
            padding: 3rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px) saturate(120%);
            -webkit-backdrop-filter: blur(15px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }

        p {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .btn:hover {
            background: transparent;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        /* Decorative "Static" Grain */
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            opacity: .03;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="blob"></div>
    <div class="noise"></div>

    <div class="glass-container">
        <h1>404</h1>
        <p>The page you are looking for has not been found. It either moved or never existed.</p>
        <a href="https://vyzzze.github.io" class="btn">Return to Homepage</a>
    </div>

</body>
</html>
